<form #form="ngForm" (submit)="onSubmit(form)">
  <input type="hidden" [value]="service.formData.paymentDetailId" name="paymentDetailId">
  <div class="mb-3">
    <label for="cardOwnerName" class="form-label">Card Owner Name</label>
    <input type="text" class="form-control" id="cardOwnerName" name="cardOwnerName" placeholder="Enter card owner name" #cardOwnerName="ngModel" [(ngModel)]="service.formData.cardOwnerName">
  </div>
  <div class="mb-3">
    <label for="cardNumber" class="form-label">Card Number</label>
    <input type="text" class="form-control" id="cardNumber" name="cardNumber" placeholder="Enter card number" #cardNumber="ngModel" [(ngModel)]="service.formData.cardNumber">
  </div>
  <div class="row">
    <div class="mb-3 col-6">
    <label for="securityCode" class="form-label">Security Code</label>
    <input type="password" class="form-control" id="securityCode" name="securityCode" placeholder="CVV" #securityCode="ngModel" [(ngModel)]="service.formData.securityCode">
  </div>
  <div class="mb-3 col-6">
    <label for="expirationDate" class="form-label">Expiration Date</label>
    <input type="text" class="form-control" id="expirationDate" name="expirationDate" placeholder="MM/YY" #expirationDate="ngModel" [(ngModel)]="service.formData.expirationDate">
  </div>
  </div>
  <button type="submit" class="btn btn-primary">Submit</button>
</form>
